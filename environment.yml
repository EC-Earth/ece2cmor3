# For developers only:
#  Remove the ece2cmor environment:
#   conda deactivate
#   rm -rf ${mambapath}/envs/ece2cmor3
#  Create the ece2cmor3 environment:
#    activatemamba
#    mamba update -y --name base mamba           # For updating mamba itself
#    mamba env create -y -f environment.yml      # Create the ece2cmor3 environment
#    conda activate ece2cmor3                    # Activate the ece2cmor3 environment
#    pip install -e .                            # Install ece2cmor3 in development mode
#  Basic tests:
#   which python                                 # ${mambapath}/envs/ece2cmor3/bin/python
#   python --version                             # Python 3.13.13
#   conda list cmor                              # cmor 3.15.1
#   conda list iris                              # iris 3.15.0
#   conda list cmip7-repack                      # cmip7-repack 1.1.0
#   conda list compliance-checker                # compliance-checker 6.1.0
#   conda list pip                               # pip 26.1.2
#   cdo -V                                       # version 2.6.1
#   drq -v                                       # version 01.02.00
#   drq -h
#   cmip7repack -h
#   cchecker.py -h
#   esgvoc use --help
#   esgvoc use cmip7@latest universe@latest      # Download & activate the latest stable CMIP7 & universe vocabulary
#   esgvoc status                                # Check the versions of the loaded ESVOG vocabularies
#   esgvoc update --check                        # If newer then: esgvoc update
#   ece2cmor -V                                  # ece2cmor v2.4.0
#   python3 -c 'from compliance_checker.runner import ComplianceChecker'  # Installation correct, if this loads without error.
#
#  The version of one of the packages can be adjusted manually, For instance change the
#  data request version of the dreq package (ensure the ece2cmor3 environment is active):
#   pip uninstall -y dreqPy==01.2.0; pip install dreqPy==01.0.33

name: ece2cmor3
channels:
  - conda-forge
  - nodefaults
dependencies:
  - cdo
  - cmip7-repack
  - compliance-checker
  - cmor
  - dreqPy==01.2.0
  - f90nml
  - gitpython
  - jsonschema
  - netcdf4
  - numpy
  - openpyxl
  - pandas
  - iris
  - pip
# - pyngl                      # See #862, #828 & #&31
  - pytest
  - python<3.14
  - python-cdo
  - python-eccodes
  - python-dateutil
  - requests
  - setuptools
  - testfixtures
  - xarray
  - xlsxwriter
  # Additionally required by tem-diag:
  - nco
  - scipy

  - pip:
     - cmip7-data-request-api
     - esgvoc
